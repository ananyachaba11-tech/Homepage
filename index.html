<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ananya Chaba | Homepage</title>
    <link rel="stylesheet" href="styles.css" />
  </head>

  <body>
    <!-- Navigation Section-->
    <nav>
      <!-- Linking each navigation "section" to part of the page which has id = "Section"-->
      <a href="#about"> About </a>
      <a href="#work"> Work </a>
      <a href="#connect"> Connect </a>
    </nav>

    <main>
      <section class="hero">
        <!--Hero section -->
        <div class="hero-left">
          <!--Assigning hero title + text + links one class on the left-->
          <h1 class="hero-left-heading">
            Hi! I'm <span class="hero-name" id="typed-name"></span>
          </h1>

          <p class="hero-left-para">
            I am a data analyst and aspiring data storyteller based in Delhi,
            India.
          </p>

          <div class="hero-left-buttons">
            <a
              href="https://www.linkedin.com/in/ananya-chaba-b32948189/"
              class="hero-left-button"
              >LinkedIn</a
            >
            <a href="https://ananyachaba.substack.com" class="hero-left-button"
              >Substack</a
            >

            <a
              href="https://github.com/ananyachaba11-tech"
              class="hero-left-button"
              >GitHub</a
            >
          </div>
        </div>

        <div class="hero-image">
          <img
            src="images/ananya-photo.jpg"
            width="400"
            height="400"
            alt="Portrait of Ananya Chaba"
          />
        </div>
      </section>
    </main>
  </body>

  <script>
    const typedName = document.getElementById("typed-name");
    const text = "Ananya.";
    let index = 0;

    function typeLetter() {
      if (index < text.length) {
        typedName.textContent += text.charAt(index);
        index++;
        setTimeout(typeLetter, 400); // typing speed in ms
      }
    }

    window.addEventListener("load", typeLetter);
  </script>
</html>
